}

  display: block;
  font-size: 18px;
  margin-bottom: 10px;
  margin-top: 20px;
}

select {
  width: 100%;
  height: 56px;
  border-radius: 16px;
  border: 2px solid #ddd;
  padding: 0 16px;
  font-size: 20px;
}

.button-row {
  display: flex;
  gap: 12px;
}

.button-row button {
  flex: 1;
  height: 60px;
  border: none;
  border-radius: 16px;
  font-size: 28px;
  font-weight: bold;
}

.active {
  background: #18a34a;
  color: white;
}

.inactive {
  background: #d9d9df;
}

.bus-item {
  padding: 14px 0;
  border-bottom: 1px solid #eee;
  font-size: 24px;
}

.next {
  color: #18a34a;
  font-weight: bold;
}

</head>

<div class="button-row">
  <button id="weekdayBtn" class="active">平日</button>
  <button id="holidayBtn" class="inactive">土日祝</button>
</div>

<label>方向</label>
<select id="directionSelect">
  <option value="up">上り</option>
  <option value="down">下り</option>
</select>

<label>路線</label>
<select id="routeSelect">
  <option value="east">東境線</option>
  <option value="west">西境線</option>
</select>

<label>停留所</label>
<select id="stopSelect"></select>

</div>

<div class="card">
  <h2>次のバス</h2>
  <div id="nextBus"></div>
</div>

<div class="card">

function updateStops() {
  const route = document.getElementById('routeSelect').value;
  const stopSelect = document.getElementById('stopSelect');

  stopSelect.innerHTML = '';

  stopLists[route].forEach(stop => {
    const option = document.createElement('option');
    option.value = stop;
    option.textContent = stop;
    stopSelect.appendChild(option);
  });

  updateTimes();
}

function updateTimes() {
  const route = document.getElementById('routeSelect').value;
  const direction = document.getElementById('directionSelect').value;
  const stop = document.getElementById('stopSelect').value;

  const times = timetableData[currentType][route][direction][stop];

  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();

  let next = '本日の運行は終了しました';

  for (const time of times) {
    const [h, m] = time.split(':').map(Number);
    const total = h * 60 + m;

    if (total >= currentMinutes) {
      next = time;
      break;
    }
  }

  document.getElementById('nextBus').innerHTML = `<div class="bus-item next">${next}</div>`;

  document.getElementById('allTimes').innerHTML = times
    .map(t => `<div class="bus-item">${t}</div>`)
    .join('');
}

updateStops();

const weekdayBtn = document.getElementById('weekdayBtn');
const holidayBtn = document.getElementById('holidayBtn');

weekdayBtn.onclick = () => {
  currentType = 'weekday';
  weekdayBtn.className = 'active';
  holidayBtn.className = 'inactive';
  updateTimes();
};

holidayBtn.onclick = () => {
  currentType = 'holiday';
  holidayBtn.className = 'active';
  weekdayBtn.className = 'inactive';
  updateTimes();
};

routeSelect.onchange = updateStops;
directionSelect.onchange = updateTimes;
stopSelect.onchange = updateTimes;
