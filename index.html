<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>刈谷市バス案内</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:sans-serif;
background:#f3f4f6;
color:#111827;
}

header{
background:#0f9d92;
color:white;
padding:22px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

header h1{
margin:0;
font-size:26px;
}

main{
padding:16px;
max-width:1100px;
margin:auto;
}

.section-title{
font-size:24px;
font-weight:bold;
margin:28px 0 16px;
}

.route-buttons,
.direction-buttons,
.day-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:16px;
}

button{
border:none;
border-radius:18px;
padding:16px;
font-size:17px;
font-weight:bold;
cursor:pointer;
background:#e5e7eb;
transition:0.2s;
}

button.active{
background:#0f9d92;
color:white;
}

.status-list{
display:flex;
flex-direction:column;
gap:12px;
}

.status-row{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.status-name{
font-weight:bold;
font-size:15px;
}

.status-badge{
padding:8px 16px;
border-radius:999px;
font-weight:bold;
color:white;
background:#4caf50;
}

select{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-size:18px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:24px;
}

.stop-name{
font-size:24px;
font-weight:bold;
margin-bottom:12px;
}

.next-label{
font-size:14px;
font-weight:bold;
color:#0f9d92;
margin-bottom:14px;
}

.times{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.time-box{
background:white;
padding:16px;
border-radius:16px;
text-align:center;
font-size:18px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.time-box.next{
background:#0f9d92;
color:white;
}

.empty{
background:white;
padding:24px;
border-radius:18px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
font-size:14px;
color:#6b7280;
}

@media(max-width:700px){

.times{
grid-template-columns:repeat(2,1fr);
}

header h1{
font-size:22px;
}

}

</style>
</head>

<body>

<header>
<h1>刈谷市バス案内</h1>
</header>

<main>

<div class="route-buttons">

<button class="active"
onclick="changeRoute('east',this)">
東境線
</button>

<button
onclick="changeRoute('west',this)">
西境線
</button>

</div>

<div class="direction-buttons">

<button class="active"
onclick="changeDirection('up',this)">
上り
</button>

<button
onclick="changeDirection('down',this)">
下り
</button>

</div>

<div class="day-buttons">

<button class="active"
onclick="changeDay('weekday',this)">
平日
</button>

<button
onclick="changeDay('holiday',this)">
土日祝
</button>

</div>

<div class="section-title">
運行状況
</div>

<div class="status-list">

<div class="status-row">
<div class="status-name">
東境線 → 刈谷市役所
</div>
<div class="status-badge">
読込中
</div>
</div>

<div class="status-row">
<div class="status-name">
東境線 → 洲原温水プール
</div>
<div class="status-badge">
読込中
</div>
</div>

<div class="status-row">
<div class="status-name">
西境線 → 刈谷市役所
</div>
<div class="status-badge">
読込中
</div>
</div>

<div class="status-row">
<div class="status-name">
西境線 → ハイウェイオアシス
</div>
<div class="status-badge">
読込中
</div>
</div>

</div>

<div class="section-title">
バス停選択
</div>

<select id="stopSelect"
onchange="updateTimetable()">
</select>

<div class="section-title">
時刻表
</div>

<div class="stop-name"
id="stopName"></div>

<div class="next-label">
緑色 = 次に来るバス
</div>

<div class="times"
id="times"></div>

</main>

<footer>
© 刈谷市バス案内システム
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyBoH2vXtEDZqv2QgCaX8EhhfLUR4FKtut8",
authDomain:"kariya-bus.firebaseapp.com",
databaseURL:"https://kariya-bus-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"kariya-bus",
storageBucket:"kariya-bus.firebasestorage.app",
messagingSenderId:"816482240507",
appId:"1:816482240507:web:edb6bb863d6bb8fa69ad5e"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const badges =
document.querySelectorAll(".status-badge");

function updateBadge(el,status){

if(status==="normal"){
el.textContent="通常運行";
el.style.background="#4caf50";

}else if(status==="delay"){
el.textContent="遅延";
el.style.background="#ff9800";

}else if(status==="suspend"){
el.textContent="運休";
el.style.background="#f44336";

}else{
el.textContent="情報なし";
el.style.background="#9e9e9e";
}

}

onValue(ref(db,"busStatus"),(snapshot)=>{

const data=snapshot.val();

if(!data)return;

updateBadge(badges[0],data.east_cityhall);
updateBadge(badges[1],data.east_pool);
updateBadge(badges[2],data.west_cityhall);
updateBadge(badges[3],data.west_oasis);

});

let currentRoute="east";
let currentDirection="up";
let currentDay="weekday";

const stops={

east:{

up:[
"富士松図書館",
"一里山市民館",
"朝日町2丁目",
"刈谷駅北口",
"交通児童遊園",
"刈谷駅南口"
],

down:[
"刈谷駅南口",
"交通児童遊園",
"刈谷駅北口",
"朝日町2丁目",
"一里山市民館",
"富士松図書館"
]

},

west:{

up:[
"富士松図書館",
"蒲生池遊園",
"今岡町日向",
"生きがいセンター",
"刈谷駅北口",
"刈谷駅南口"
],

down:[
"刈谷駅南口",
"刈谷駅北口",
"生きがいセンター",
"今岡町日向",
"蒲生池遊園",
"富士松図書館"
]

}

};

/* PDF参照実時刻 */

const timetable={

"富士松図書館":{
weekday:[
"06:12","06:48","07:18","07:52",
"08:25","09:05","09:45","10:25",
"11:05","11:45","12:25","13:05",
"13:45","14:25","15:05","15:45",
"16:25","17:05","17:45","18:25"
],
holiday:[
"07:05","08:05","09:05","10:05",
"11:05","12:05","13:05","14:05",
"15:05","16:05","17:05"
]
},

"刈谷駅北口":{
weekday:[
"06:32","07:08","07:38","08:12",
"08:45","09:25","10:05","10:45",
"11:25","12:05","12:45","13:25",
"14:05","14:45","15:25","16:05",
"16:45","17:25","18:05","18:45"
],
holiday:[
"07:25","08:25","09:25","10:25",
"11:25","12:25","13:25","14:25",
"15:25","16:25","17:25"
]
},

"刈谷駅南口":{
weekday:[
"06:36","07:12","07:42","08:16",
"08:49","09:29","10:09","10:49",
"11:29","12:09","12:49","13:29",
"14:09","14:49","15:29","16:09",
"16:49","17:29","18:09","18:49"
],
holiday:[
"07:29","08:29","09:29","10:29",
"11:29","12:29","13:29","14:29",
"15:29","16:29","17:29"
]
}

};

window.changeRoute=function(route,btn){

currentRoute=route;

document
.querySelectorAll(".route-buttons button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

loadStops();

}

window.changeDirection=function(direction,btn){

currentDirection=direction;

document
.querySelectorAll(".direction-buttons button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

loadStops();

}

window.changeDay=function(day,btn){

currentDay=day;

document
.querySelectorAll(".day-buttons button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

updateTimetable();

}

function loadStops(){

const select =
document.getElementById("stopSelect");

select.innerHTML="";

stops[currentRoute][currentDirection]
.forEach(stop=>{

const option =
document.createElement("option");

option.value=stop;
option.textContent=stop;

select.appendChild(option);

});

updateTimetable();

}

window.updateTimetable=function(){

const stop =
document.getElementById("stopSelect").value;

document.getElementById("stopName")
.textContent=stop;

const timesDiv =
document.getElementById("times");

timesDiv.innerHTML="";

if(
!timetable[stop] ||
!timetable[stop][currentDay]
){

timesDiv.innerHTML=
'<div class="empty">時刻表データなし</div>';

return;

}

const list =
timetable[stop][currentDay];

const now = new Date();

const currentMinutes =
now.getHours()*60 + now.getMinutes();

let nextFound=false;

list.forEach(time=>{

const parts=time.split(":");

const busMinutes =
Number(parts[0])*60 +
Number(parts[1]);

const div =
document.createElement("div");

div.className="time-box";

div.textContent=time;

if(
!nextFound &&
busMinutes >= currentMinutes
){

div.classList.add("next");
nextFound=true;

}

timesDiv.appendChild(div);

});

if(!nextFound){

const endDiv =
document.createElement("div");

endDiv.className="empty";

endDiv.textContent=
"本日の運行は終了しました";

timesDiv.appendChild(endDiv);

}

}

loadStops();

</script>

</body>
</html>
