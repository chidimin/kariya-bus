function setRoute(route){  
    currentRoute = route;  
  
    document.getElementById("routeEast").classList.remove("active");  
    document.getElementById("routeWest").classList.remove("active");  
  
    if(route==="east"){  
        document.getElementById("routeEast").classList.add("active");  
    }else{  
        document.getElementById("routeWest").classList.add("active");  
    }  
  
    render();  
}  
  
function setDay(day){  
    currentDay = day;  
  
    document.getElementById("weekdayBtn").classList.remove("active");  
    document.getElementById("holidayBtn").classList.remove("active");  
  
    if(day==="weekday"){  
        document.getElementById("weekdayBtn").classList.add("active");  
    }else{  
        document.getElementById("holidayBtn").classList.add("active");  
    }  
  
    render();  
}  
  
function setDirection(direction) {  
  currentDirection = direction;  
  
  document.getElementById("upButton").classList.remove("active");  
  document.getElementById("downButton").classList.remove("active");  
  
  if (direction === "up") {  
    document.getElementById("upButton").classList.add("active");  
  } else {  
    document.getElementById("downButton").classList.add("active");  
  }  
  
  render();  
}  
  
function render(){  
  
    let nextBusFound = false;  
  
    const now = new Date();  
  
    const currentMinutes =  
        now.getHours() * 60 + now.getMinutes();  
  
    const obj = data[currentRoute][currentDay][currentDirection];  
  
    let html = "<table>";  
  
    html += "<tr><th>便</th>";  
  
    obj.stops.forEach(stop=>{  
        html += `<th>${stop}</th>`;  
    });  
  
    html += "</tr>";  
  
    obj.times.forEach((row,index)=>{  
  
        html += `<tr>  
        <td class="stop">${index+1}便</td>`;  
  
       row.forEach(time=>{  
  
    let className = "";  
  
    if(time !== "-"){  
  
        const [hour, minute] =  
            time.split(":").map(Number);  
  
        const busMinutes =  
            hour * 60 + minute;  
  
        if(  
            !nextBusFound &&  
            busMinutes >= currentMinutes  
        ){  
  
            className = "nextBus";  
  
            nextBusFound = true;  
        }  
    }  
  
    html += `  
        <td class="${className}">  
            ${time}  
        </td>  
    `;  
});  
html += "</tr>";  
    });  
    html += "</table>";  
  
    document.getElementById("tableArea").innerHTML = html;  
  
    const routeName =  
        currentRoute==="east" ? "東境線" : "西境線";  
  
    const dayName =  
        currentDay==="weekday" ? "平日" : "土日祝";  
  
    const directionName =  
        currentDirection==="up" ? "上り" : "下り";  
  
    document.getElementById("title").innerText =  
    `${routeName} ${dayName} ${directionName}`;  
  
}  
  
render();
