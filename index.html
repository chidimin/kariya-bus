<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>刈谷市バス案内</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:sans-serif;
background:#f3f4f6;
color:#111827;
}

header{
background:#0f9d92;
color:white;
padding:24px 16px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

header h1{
margin:0;
font-size:28px;
}

main{
padding:16px;
max-width:900px;
margin:auto;
}

.section-title{
font-size:24px;
font-weight:bold;
margin:28px 0 16px;
}

.route-buttons,
.direction-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:16px;
}

button{
border:none;
border-radius:18px;
padding:16px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:#e5e7eb;
transition:0.2s;
width:100%;
}

button:hover{
opacity:0.9;
}

button.active{
background:#0f9d92;
color:white;
}

.status-list{
display:flex;
flex-direction:column;
gap:14px;
}

.status-row{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.status-name{
font-size:16px;
font-weight:bold;
}

.status-badge{
display:inline-block;
padding:8px 16px;
border-radius:999px;
color:white;
font-weight:bold;
font-size:14px;
background:#4caf50;
}

select{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-size:18px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:24px;
}

.stop-name{
font-size:24px;
font-weight:bold;
margin-bottom:18px;
}

.next-label{
font-size:14px;
color:#0f9d92;
font-weight:bold;
margin-bottom:10px;
}

.times{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.time-box{
background:white;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.time-box.next{
background:#0f9d92;
color:white;
}

.empty{
background:white;
padding:24px;
border-radius:18px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
font-size:14px;
color:#6b7280;
}

@media(max-width:600px){

header h1{
font-size:22px;
}

.section-title{
font-size:20px;
}

.time-box{
font-size:18px;
padding:14px;
}

}

</style>
</head>

<body>

<header>
<h1>刈谷市バス案内</h1>
</header>

<main>

<div class="route-buttons">

<button class="active"
onclick="changeRoute('east',this)">
東境線
</button>

<button
onclick="changeRoute('west',this)">
西境線
</button>

</div>

<div class="direction-buttons">

<button class="active"
onclick="changeDirection('up',this)">
上り
</button>

<button
onclick="changeDirection('down',this)">
下り
</button>

</div>

<div class="section-title">
運行状況
</div>

<div class="status-list">

<div class="status-row">
<div class="status-name">
東境線 → 刈谷市役所行
</div>
<div class="status-badge">
読込中
</div>
</div>

<div class="status-row">
<div class="status-name">
東境線 → 洲原温水プール行
</div>
<div class="status-badge">
読込中
</div>
</div>

<div class="status-row">
<div class="status-name">
西境線 → 刈谷市役所行
</div>
<div class="status-badge">
読込中
</div>
</div>

<div class="status-row">
<div class="status-name">
西境線 → ハイウェイオアシス行
</div>
<div class="status-badge">
読込中
</div>
</div>

</div>

<div class="section-title">
バス停選択
</div>

<select id="stopSelect"
onchange="updateTimetable()">
</select>

<div class="section-title">
時刻表
</div>

<div class="stop-name"
id="stopName"></div>

<div class="next-label">
次のバス
</div>

<div class="times"
id="times"></div>

</main>

<footer>
© 刈谷市バス案内システム
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* Firebase */

const firebaseConfig = {

apiKey:
"AIzaSyBoH2vXtEDZqv2QgCaX8EhhfLUR4FKtut8",

authDomain:
"kariya-bus.firebaseapp.com",

databaseURL:
"https://kariya-bus-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:
"kariya-bus",

storageBucket:
"kariya-bus.firebasestorage.app",

messagingSenderId:
"816482240507",

appId:
"1:816482240507:web:edb6bb863d6bb8fa69ad5e"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

/* 運行状況 */

const badges =
document.querySelectorAll(".status-badge");

function updateBadge(el,status){

if(status==="normal"){

el.textContent="通常運行";
el.style.background="#4caf50";

}else if(status==="delay"){

el.textContent="遅延";
el.style.background="#ff9800";

}else if(status==="stop"){

el.textContent="運休";
el.style.background="#f44336";

}else{

el.textContent="情報なし";
el.style.background="#9e9e9e";

}

}

onValue(ref(db,"busStatus"),
(snapshot)=>{

const data = snapshot.val();

if(!data){

badges.forEach(b=>{
updateBadge(b,"none");
});

return;

}

updateBadge(
badges[0],
data.east_cityhall
);

updateBadge(
badges[1],
data.east_pool
);

updateBadge(
badges[2],
data.west_cityhall
);

updateBadge(
badges[3],
data.west_oasis
);

});

/* 現在状態 */

let currentRoute="east";
let currentDirection="up";

/* バス停 */

const stops={

east:{

up:[
"富士松図書館",
"一里山市民館",
"朝日町2丁目",
"刈谷駅北口",
"交通児童遊園",
"刈谷駅南口"
],

down:[
"刈谷駅南口",
"交通児童遊園",
"刈谷駅北口",
"朝日町2丁目",
"一里山市民館",
"富士松図書館"
]

},

west:{

up:[
"富士松図書館",
"蒲生池遊園",
"今岡町日向",
"生きがいセンター",
"刈谷駅北口",
"刈谷駅南口"
],

down:[
"刈谷駅南口",
"刈谷駅北口",
"生きがいセンター",
"今岡町日向",
"蒲生池遊園",
"富士松図書館"
]

}

};

/* 共通時刻生成 */

function generateTimes(startHour,startMinute){

const result=[];

let hour=startHour;
let minute=startMinute;

for(let i=0;i<40;i++){

result.push(
String(hour).padStart(2,"0")
+ ":"
+ String(minute).padStart(2,"0")
);

minute+=20;

if(minute>=60){
minute-=60;
hour++;
}

}

return result;

}

/* 時刻表 */

const timetable={

"富士松図書館":
generateTimes(6,0),

"一里山市民館":
generateTimes(6,5),

"朝日町2丁目":
generateTimes(6,10),

"刈谷駅北口":
generateTimes(6,20),

"交通児童遊園":
generateTimes(6,25),

"刈谷駅南口":
generateTimes(6,35),

"蒲生池遊園":
generateTimes(6,8),

"今岡町日向":
generateTimes(6,15),

"生きがいセンター":
generateTimes(6,18)

};

/* 路線変更 */

window.changeRoute=function(route,btn){

currentRoute=route;

document
.querySelectorAll(".route-buttons button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

loadStops();

}

/* 上下変更 */

window.changeDirection=function(direction,btn){

currentDirection=direction;

document
.querySelectorAll(".direction-buttons button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

loadStops();

}

/* バス停読み込み */

function loadStops(){

const select =
document.getElementById("stopSelect");

select.innerHTML="";

stops[currentRoute][currentDirection]
.forEach(stop=>{

const option =
document.createElement("option");

option.value=stop;
option.textContent=stop;

select.appendChild(option);

});

updateTimetable();

}

/* 時刻表更新 */

window.updateTimetable=function(){

const stop =
document.getElementById("stopSelect").value;

document.getElementById("stopName")
.textContent=stop;

const timesDiv =
document.getElementById("times");

timesDiv.innerHTML="";

if(!timetable[stop]){

timesDiv.innerHTML=
'<div class="empty">時刻表データなし</div>';

return;

}

const now = new Date();

const currentTime =
String(now.getHours()).padStart(2,"0")
+ ":"
+ String(now.getMinutes()).padStart(2,"0");

const upcoming =
timetable[stop]
.filter(t=>t>=currentTime);

if(upcoming.length===0){

timesDiv.innerHTML=
'<div class="empty">本日の運行は終了しました</div>';

return;

}

upcoming.forEach((time,index)=>{

const div =
document.createElement("div");

div.className="time-box";

if(index===0){
div.classList.add("next");
}

div.textContent=time;

timesDiv.appendChild(div);

});

}

/* 初期化 */

loadStops();

</script>

</body>
</html>
