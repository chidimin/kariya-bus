<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>刈谷市バス案内</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#eef3f8;
}

header{
    background:#0b63c9;
    color:white;
    padding:16px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.info{
    text-align:center;
    padding:10px;
    font-size:18px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:12px;
}

.card{
    background:white;
    border-radius:14px;
    padding:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.route-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.status{
    padding:8px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    margin-bottom:10px;
}

.normal{
    background:#16a34a;
}

.delay{
    background:#ea580c;
}

.suspend{
    background:#dc2626;
}

.next-bus{
    background:#fff3cd;
    border:2px solid #f59e0b;
    padding:8px;
    border-radius:10px;
    margin-bottom:10px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0b63c9;
    color:white;
    padding:6px;
    font-size:13px;
}

td{
    border-bottom:1px solid #ddd;
    padding:6px;
    text-align:center;
    font-size:14px;
}

.next{
    background:#fff7cc;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
刈谷市バス案内
</header>

<div class="info" id="dayType"></div>

<div class="grid" id="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBoH2vXtEDZqv2QgCaX8EhhfLUR4FKtut8",
    authDomain: "kariya-bus.firebaseapp.com",
    databaseURL: "https://kariya-bus-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kariya-bus",
    storageBucket: "kariya-bus.firebasestorage.app",
    messagingSenderId: "816482240507",
    appId: "1:816482240507:web:edb6bb863d6bb8fa69ad5e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const isHoliday = [0,6].includes(new Date().getDay());

document.getElementById("dayType").innerText =
isHoliday ? "土日祝ダイヤ" : "平日ダイヤ";

const timetable = {

east_cityhall:{
title:"東境線（刈谷市役所行）",

weekday:[
"6:00","6:45","7:20","9:40","10:50",
"11:25","13:30","15:40","17:10","18:20"
],

holiday:[
"6:20","7:40","9:35","10:55","12:00",
"13:35","14:45","16:05","17:15","18:35"
]
},

east_pool:{
title:"東境線（洲原温水プール行）",

weekday:[
"7:30","8:45","9:25","11:45","13:40",
"15:10","16:15","17:30","19:00","20:10"
],

holiday:[
"7:40","9:00","10:00","11:15","12:50",
"14:10","15:20","17:00","18:40","20:10"
]
},

west_cityhall:{
title:"西境線（刈谷市役所行）",

weekday:[
"6:10","7:00","7:40","9:50","10:45",
"11:35","13:50","15:52","17:22","18:29"
],

holiday:[
"6:50","8:10","10:00","11:20","11:55",
"13:30","14:30","15:40","16:55","18:15"
]
},

west_oasis:{
title:"西境線（刈谷ハイウェイオアシス行）",

weekday:[
"7:45","9:00","9:40","11:55","13:55",
"15:20","16:30","17:35","19:05","20:20"
],

holiday:[
"8:10","9:30","10:25","11:25","13:45",
"15:00","16:20","17:20","18:20","20:20"
]
}

};

function nowMinutes(){
    const now = new Date();
    return now.getHours()*60 + now.getMinutes();
}

function getNextBus(times){

    const now = nowMinutes();

    for(const time of times){

        const [h,m] = time.split(":").map(Number);

        const total = h*60 + m;

        if(total >= now){
            return time;
        }
    }

    return "本日の運行終了";
}

function render(statusData){

    const container = document.getElementById("container");

    container.innerHTML = "";

    Object.keys(timetable).forEach(key=>{

        const route = timetable[key];

        const times = isHoliday
            ? route.holiday
            : route.weekday;

        const data = statusData[key] || {};

        const status = data.status || "normal";

        const delayMinutes = data.delayMinutes || 0;

        let statusText = "通常運行";
        let statusClass = "normal";

        if(status === "delay"){
            statusText = `遅延 ${delayMinutes}分`;
            statusClass = "delay";
        }

        if(status === "suspend"){
            statusText = "運休";
            statusClass = "suspend";
        }

        const nextBus = getNextBus(times);

        let rows = "";

        times.forEach(time=>{

            const [h,m] = time.split(":").map(Number);

            const total = h*60 + m;

            const now = nowMinutes();

            const nextClass =
                total >= now &&
                total <= now + 30
                ? "next"
                : "";

            rows += `
            <tr class="${nextClass}">
                <td>${time}</td>
            </tr>
            `;
        });

        container.innerHTML += `

        <div class="card">

            <div class="route-title">
                ${route.title}
            </div>

            <div class="status ${statusClass}">
                ${statusText}
            </div>

            <div class="next-bus">
                次の便：
                ${nextBus}
            </div>

            <table>

                <tr>
                    <th>始発時刻</th>
                </tr>

                ${rows}

            </table>

        </div>

        `;
    });
}

onValue(ref(db,"busStatus"), snapshot=>{

    const data = snapshot.val() || {};

    render(data);

});

</script>

</body>
</html>
