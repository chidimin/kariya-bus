<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刈谷市バス時刻表</title>
<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 16px;
  background: #f4f4f4;
}h1 { text-align: center; }

.container { max-width: 700px; margin: auto; }

.controls { display: grid; gap: 12px; margin-bottom: 20px; }

select { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }

.card { background: white; border-radius: 14px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

#times { display: grid; grid-template-columns: repeat(auto-fill,minmax(70px,1fr)); gap: 10px; margin-top: 16px; }

.time { background: #1976d2; color: white; text-align: center; padding: 10px; border-radius: 10px; font-weight: bold; }

.note { margin-top: 18px; font-size: 14px; color: #666; } </style>

</head>
<body>
<div class="container">
<h1>刈谷市バス時刻表</h1><div class="controls">
<select id="routeSelect">
  <option value="east">東境線</option>
  <option value="west">西境線</option>
</select><select id="stopSelect"></select>

<select id="daySelect">
  <option value="weekday">平日</option>
  <option value="holiday">土休日</option>
</select>
</div><div class="card">
  <h2 id="title">時刻表</h2>
  <div id="times"></div>
  <div class="note">
    ※ 現在は取得済み停留所データのみ搭載しています。
  </div>
</div>
</div><script>
const data = {
  east: {
    "富士松図書館": {
      weekday: ["06:12","06:47","07:15","08:05","09:10"],
      holiday: ["07:00","08:10","09:20"]
    },
    "一里山市民館": {
      weekday: ["06:20","07:02","08:15","09:30"],
      holiday: ["07:15","08:25"]
    },
    "朝日町2丁目": {
      weekday: ["06:35","07:20","08:40"],
      holiday: ["07:40","08:55"]
    },
    "刈谷駅北口": {
      weekday: ["06:50","07:30","08:50","09:40"],
      holiday: ["07:55","09:05"]
    },
    "交通児童遊園": {
      weekday: ["07:00","07:45","09:05"],
      holiday: ["08:10","09:20"]
    },
    "刈谷駅南口": {
      weekday: ["07:10","08:00","09:15"],
      holiday: ["08:25","09:35"]
    }
  },

  west: {
    "富士松図書館": {
      weekday: ["06:18","07:00","08:00"],
      holiday: ["07:05","08:15"]
    },
    "蒲生池遊園": {
      weekday: ["06:25","07:10","08:20"],
      holiday: ["07:20","08:35"]
    },
    "今岡町日向": {
      weekday: ["06:40","07:25","08:45"],
      holiday: ["07:40","08:55"]
    },
    "生きがいセンター": {
      weekday: ["06:55","07:40","09:00"],
      holiday: ["07:55","09:10"]
    },
    "刈谷駅北口": {
      weekday: ["07:10","08:00","09:15"],
      holiday: ["08:15","09:30"]
    },
    "刈谷駅南口": {
      weekday: ["07:20","08:15","09:30"],
      holiday: ["08:30","09:45"]
    }
  }
};

const routeSelect = document.getElementById('routeSelect');
const stopSelect = document.getElementById('stopSelect');
const daySelect = document.getElementById('daySelect');
const timesDiv = document.getElementById('times');
const title = document.getElementById('title');

function updateStops() {
  const route = routeSelect.value;
  const stops = Object.keys(data[route]);

  stopSelect.innerHTML = '';

  stops.forEach(stop => {
    const option = document.createElement('option');
    option.value = stop;
    option.textContent = stop;
    stopSelect.appendChild(option);
  });

  renderTimes();
}

function renderTimes() {
  const route = routeSelect.value;
  const stop = stopSelect.value;
  const day = daySelect.value;

  const times = data[route][stop][day];

  title.textContent = `${stop} (${day === 'weekday' ? '平日' : '土休日'})`;

  timesDiv.innerHTML = '';

  times.forEach(time => {
    const div = document.createElement('div');
    div.className = 'time';
    div.textContent = time;
    timesDiv.appendChild(div);
  });
}

routeSelect.addEventListener('change', updateStops);
stopSelect.addEventListener('change', renderTimes);
daySelect.addEventListener('change', renderTimes);

updateStops();
</script></body>
</html>
