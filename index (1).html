  <script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyBoH2vXtEDZqv2QgCaX8EhhfLUR4FKtut8",

  authDomain: "kariya-bus.firebaseapp.com",

  databaseURL:
  "https://kariya-bus-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId: "kariya-bus",

  storageBucket: "kariya-bus.firebasestorage.app",

  messagingSenderId: "816482240507",

  appId:
  "1:816482240507:web:edb6bb863d6bb8fa69ad5e",

  measurementId: "G-3FJZD8KLJY"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const badges =
document.querySelectorAll(".status-badge");

function updateBadge(element, status){

   if(status === "normal"){

      element.textContent = "通常運行";
      element.style.background = "#4caf50";

   }

   else if(status === "delay"){

      element.textContent = "遅延";
      element.style.background = "#ff9800";

   }

   else{

      element.textContent = "運休";
      element.style.background = "#f44336";

   }

}

onValue(ref(db, "busStatus"), (snapshot)=>{

   const data = snapshot.val();

   if(!data) return;

   updateBadge(
      badges[0],
      data.east_cityhall
   );

   updateBadge(
      badges[1],
      data.east_pool
   );

   updateBadge(
      badges[2],
      data.west_cityhall
   );

   updateBadge(
      badges[3],
      data.west_oasis
   );

});

</script>
</body>

.status-list{

}

.status-row{

.status-name{

.badge{

.normal{

.stop{

/* バス停選択 */

select{

    border-radius:20px;

}

/* 時刻表 */

.stop-name{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}

.times{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.time-box{
    background:white;
    padding:20px 8px;
    border-radius:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* 路線変更 */

function changeRoute(route,btn){

    currentRoute = route;

    document.querySelectorAll(".route-btn")
    .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    loadStops();

}

/* 上下変更 */

function changeDirection(direction,btn){

    currentDirection = direction;

    document.querySelectorAll(".direction-btn")
    .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    loadStops();

}

/* バス停読込 */

function loadStops(){

    const select =
    document.getElementById("stopSelect");

    select.innerHTML = "";

    stops[currentRoute][currentDirection]
    .forEach(stop=>{

        const option =
        document.createElement("option");

        option.value = stop;
        option.textContent = stop;

        select.appendChild(option);

    });

    updateTimetable();

}

/* 時刻表更新 */

function updateTimetable(){

    const stop =
    document.getElementById("stopSelect").value;

    document.getElementById("stopName")
    .textContent = stop;

    const timesDiv =
    document.getElementById("times");

    timesDiv.innerHTML = "";

    timetable[stop].forEach(time=>{

        const div =
        document.createElement("div");

        div.className = "time-box";

        div.textContent = time;

        timesDiv.appendChild(div);

    });

}

/* 運行状況 */

function getStatus(){

    const now = new Date();

    const hour = now.getHours();

    if(hour >= 6 && hour < 22){
        return "normal";
    }

    return "stop";

}

function updateStatus(){

    const status = getStatus();

    const badges =
    document.querySelectorAll(".badge");

    badges.forEach(badge=>{

        if(status === "normal"){

            badge.textContent = "通常運行";

            badge.classList.remove("stop");

            badge.classList.add("normal");

        }else{

            badge.textContent = "運行終了";

            badge.classList.remove("normal");

            badge.classList.add("stop");

        }

    });

}
